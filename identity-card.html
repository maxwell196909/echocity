<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的数字身份证 | EchoCity</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #ffffff;
      background:
        linear-gradient(rgba(7, 18, 28, 0.82), rgba(7, 18, 28, 0.92)),
        url("city-vision.jpg") center/cover fixed;
    }

    .topbar {
      height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 7%;
      background: rgba(8, 22, 32, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #f1b44c;
    }

    .nav-link {
      color: #ffffff;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 10px 18px;
      border-radius: 24px;
    }

    .page {
      width: min(900px, 92%);
      margin: 50px auto;
    }

    .title {
      text-align: center;
      margin-bottom: 34px;
    }

    .title h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }

    .title p {
      color: #cfd9df;
      line-height: 1.7;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 38px;
      background:
        linear-gradient(
          145deg,
          rgba(19, 57, 76, 0.98),
          rgba(32, 43, 66, 0.98)
        );
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
    }

    .card::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      right: -120px;
      top: -140px;
      background: rgba(241, 180, 76, 0.15);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .card-brand {
      color: #f1b44c;
      font-size: 15px;
      letter-spacing: 3px;
    }

    .card-number {
      color: #c9d3d9;
      font-size: 14px;
    }

    .identity-main {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 28px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1b44c;
      color: #18303d;
      font-size: 52px;
      font-weight: bold;
      border: 5px solid rgba(255, 255, 255, 0.18);
    }

    .name {
      font-size: 38px;
      margin-bottom: 8px;
    }

    .role {
      color: #c9d4da;
      font-size: 18px;
    }

    .details {
      margin-top: 34px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .detail {
      background: rgba(255, 255, 255, 0.07);
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .detail h3 {
      color: #f1b44c;
      font-size: 14px;
      margin-bottom: 7px;
    }

    .detail p {
      line-height: 1.65;
      color: #edf2f4;
    }

    .footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      color: #b8c5cc;
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 28px;
      justify-content: center;
    }

    .button {
      text-decoration: none;
      border: none;
      cursor: pointer;
      padding: 13px 22px;
      border-radius: 28px;
      font-size: 15px;
    }

    .primary {
      background: #f1b44c;
      color: #182b35;
      font-weight: bold;
    }

    .secondary {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 700px) {
      .identity-main {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .avatar {
        margin: auto;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .card-header {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="logo">EchoCity</div>
    <a class="nav-link" href=" ">返回首页</a >
  </header>

  <main class="page">
    <section class="title">
      <h1>我的数字身份证</h1>
      <p>
        这是你进入 EchoCity 的身份凭证，也是你在数字文明中的第一份个人记录。
      </p >
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-brand">ECHOCITY DIGITAL IDENTITY</div>
        <div class="card-number" id="cardNumber">
          编号：EC-000000
        </div>
      </div>

      <div class="identity-main">
        <div class="avatar" id="avatar">E</div>

        <div>
          <h2 class="name" id="name">你的名字</h2>
          <p class="role" id="role">数字文明参与者</p >
        </div>
      </div>

      <div class="details">
        <div class="detail">
          <h3>我的使命</h3>
          <p id="mission">尚未填写</p >
        </div>

        <div class="detail">
          <h3>我的价值观</h3>
          <p id="values">尚未填写</p >
        </div>

        <div class="detail">
          <h3>我的愿望</h3>
          <p id="wish">尚未填写</p >
        </div>

        <div class="detail">
          <h3>所属社区</h3>
          <p id="city">EchoCity</p >
        </div>

        <div class="detail">
          <h3>加入时间</h3>
          <p id="joinDate">尚未生成</p >
        </div>

        <div class="detail">
          <h3>身份状态</h3>
          <p>已激活</p >
        </div>
      </div>

      <div class="footer">
        数据文明，不仅仅是数据的输入与输出，而是服务有灵魂的人。
      </div>
    </section>

    <div class="actions">
      <a class="button secondary" href="mycity.html">
        修改身份
      </a >

      <button
        class="button primary"
        type="button"
        onclick="downloadCard()"
      >
        保存身份信息
      </button>
    </div>
  </main>

  <script>
    const savedIdentity =
      localStorage.getItem("echoCityIdentity");

    if (!savedIdentity) {
      alert("还没有创建数字身份，请先填写身份信息。");
      window.location.href = "mycity.html";
    } else {
      const data = JSON.parse(savedIdentity);

      document.getElementById("name").textContent =
        data.name || "你的名字";

      document.getElementById("role").textContent =
        data.role || "数字文明参与者";

      document.getElementById("mission").textContent =
        data.mission || "尚未填写";

      document.getElementById("values").textContent =
        data.values || "尚未填写";

      document.getElementById("wish").textContent =
        data.wish || "尚未填写";

      document.getElementById("city").textContent =
        data.city || "EchoCity";

      document.getElementById("avatar").textContent =
        data.name
          ? data.name.charAt(0).toUpperCase()
          : "E";

      if (!data.identityNumber) {
        const randomNumber =
          Math.floor(100000 + Math.random() * 900000);

        data.identityNumber =
          "EC-2026-" + randomNumber;
      }

      if (!data.joinDate) {
        data.joinDate =
          new Date().toLocaleDateString("zh-CN");
      }

      localStorage.setItem(
        "echoCityIdentity",
        JSON.stringify(data)
      );

      document.getElementById("cardNumber").textContent =
        "编号：" + data.identityNumber;

      document.getElementById("joinDate").textContent =
        data.joinDate;
    }

    function downloadCard() {
      const data = JSON.parse(
        localStorage.getItem("echoCityIdentity")
      );

      if (!data) {
        alert("没有找到数字身份信息。");
        return;
      }

      const content =
`EchoCity 数字身份

姓名：${data.name || ""}
身份描述：${data.role || ""}
使命：${data.mission || ""}
价值观：${data.values || ""}
愿望：${data.wish || ""}
所属社区：${data.city || ""}
数字编号：${data.identityNumber || ""}
加入时间：${data.joinDate || ""}

数据文明，不仅仅是数据的输入与输出，而是服务有灵魂的人。`;

      const blob = new Blob(
        [content],
        {
          type: "text/plain;charset=utf-8"
        }
      );

      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = "EchoCity-数字身份.txt";

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(link.href);
    }
  </script>
</body>
</html>
