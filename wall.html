<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愿望广场｜EchoCity</title>
  <link rel="stylesheet" href="style.css?v=20260716-4">
</head>
<body class="inner-page wall-page">
  <header class="simple-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">E</span>
      <span>EchoCity</span>
    </a>
    <a class="btn btn-primary small" href="wish.html">发布愿望</a>
  </header>

  <main class="wall-shell">
    <section class="wall-heading">
      <p class="eyebrow">WISH WALL</p>
      <h1>愿望广场</h1>
      <p>愿望被看见，同行者才有机会出现。</p>
    </section>

    <section class="wall-toolbar">
      <div>
        <strong id="wallCount">正在读取愿望……</strong>
        <p id="wallStatus" class="wall-status">请稍候</p>
      </div>
      <a class="wall-share-link" href="wish.html">＋ 发布一个新愿望</a>
    </section>

    <section id="wishGrid" class="wish-grid" aria-live="polite"></section>
  </main>

  <script>
    const SUPABASE_URL = "https://fhckjaidiqnozhpxkavt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_g--rklRl7JhuX2RsA5L-ow_wi5w9tYa";

    async function loadWishes() {
      const status = document.getElementById("wallStatus");
      const count = document.getElementById("wallCount");
      const grid = document.getElementById("wishGrid");

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/wishes?select=id,created_at,wish,importance,difficulty,companion,first_step&order=created_at.desc&limit=60`,
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        const rows = await response.json();

        if (!response.ok) {
          throw new Error(rows.message || "读取失败");
        }

        if (!rows.length) {
          count.textContent = "还没有愿望";
          status.textContent = "成为第一个发布愿望的人。";
          return;
        }

        count.textContent = `已经有 ${rows.length} 个愿望被看见`;
        status.textContent = "愿望会按照发布时间由新到旧排列。";

        grid.innerHTML = rows.map((item, index) => {
          const avatar = getAvatar(item.wish, index);
          return `
            <article class="wish-card community-card">
              <div class="wish-card-top">
                <div class="wish-avatar" aria-hidden="true">${avatar}</div>
                <div class="wish-meta">
                  <strong>EchoCity 居民</strong>
                  <span title="${formatFullTime(item.created_at)}">${formatRelativeTime(item.created_at)}</span>
                </div>
              </div>

              <div class="wish-card-body">
                <p class="wish-label">愿望</p>
                <h2>${escapeHtml(item.wish)}</h2>

                <div class="wish-detail-list">
                  <p><strong>为什么重要</strong><span>${escapeHtml(item.importance || "未填写")}</span></p>
                  <p><strong>当前困难</strong><span>${escapeHtml(item.difficulty || "未填写")}</span></p>
                  <p><strong>希望同行者</strong><span>${escapeHtml(item.companion || "未填写")}</span></p>
                  <p><strong>第一步</strong><span>${escapeHtml(item.first_step || "未填写")}</span></p>
                </div>
              </div>

              <div class="wish-card-actions">
                <button class="companion-button" type="button" data-wish-id="${item.id}" data-wish-text="${escapeAttribute(item.wish)}">我愿意同行</button>
              </div>

              <div class="wish-card-footer">
                <span>愿望编号 EC-${String(item.id).padStart(4, "0")}</span>
                <span class="wish-visible-badge">公开可见</span>
              </div>
            </article>
          `;
        }).join("");
        bindCompanionButtons();
      } catch (error) {
        count.textContent = "愿望读取失败";
        status.textContent = error.message;
        status.classList.add("error");
      }
    }

    function formatRelativeTime(dateString) {
      const then = new Date(dateString);
      const now = new Date();
      const diff = now - then;
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;

      if (diff < minute) return "刚刚";
      if (diff < hour) return `${Math.floor(diff / minute)}分钟前`;
      if (diff < day) {
        if (then.toDateString() === now.toDateString()) {
          return `今天 ${then.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
        }
        return `${Math.floor(diff / hour)}小时前`;
      }

      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      if (then.toDateString() === yesterday.toDateString()) {
        return `昨天 ${then.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
      }

      if (diff < 7 * day) return `${Math.floor(diff / day)}天前`;

      return then.toLocaleDateString("zh-CN", {
        year: then.getFullYear() === now.getFullYear() ? undefined : "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatFullTime(dateString) {
      return new Date(dateString).toLocaleString("zh-CN");
    }

    function getAvatar(text, index) {
      const symbols = ["愿", "梦", "行", "光", "城", "心", "路", "新"];
      let sum = index;
      for (const char of String(text || "")) sum += char.charCodeAt(0);
      return symbols[sum % symbols.length];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

\n    const modal = document.getElementById("applicationModal");\n    const applicationForm = document.getElementById("applicationForm");\n    const applicationMessage = document.getElementById("applicationMessage");\n    const applicationButton = document.getElementById("applicationSubmitButton");\n\n    function bindCompanionButtons() {\n      document.querySelectorAll(".companion-button").forEach((button) => {\n        button.addEventListener("click", () => {\n          applicationForm.reset();\n          document.getElementById("applicationWishId").value = button.dataset.wishId;\n          document.getElementById("selectedWishText").textContent = `申请同行的愿望：${button.dataset.wishText}`;\n          applicationMessage.textContent = "";\n          modal.hidden = false;\n          document.body.classList.add("modal-open");\n        });\n      });\n    }\n\n    document.querySelectorAll("[data-close-modal]").forEach((element) => {\n      element.addEventListener("click", () => {\n        modal.hidden = true;\n        document.body.classList.remove("modal-open");\n      });\n    });\n\n    applicationForm.addEventListener("submit", async (event) => {\n      event.preventDefault();\n      const payload = {\n        wish_id: Number(document.getElementById("applicationWishId").value),\n        name: document.getElementById("applicantName").value.trim(),\n        message: document.getElementById("applicantMessage").value.trim(),\n        contact: document.getElementById("applicantContact").value.trim()\n      };\n      applicationButton.disabled = true;\n      applicationButton.textContent = "正在提交……";\n      applicationMessage.textContent = "正在把你的同行申请送往 EchoCity……";\n      applicationMessage.classList.remove("error");\n      try {\n        const response = await fetch(`${SUPABASE_URL}/rest/v1/applications`, {\n          method: "POST",\n          headers: {\n            "Content-Type": "application/json",\n            "apikey": SUPABASE_KEY,\n            "Authorization": `Bearer ${SUPABASE_KEY}`,\n            "Prefer": "return=representation"\n          },\n          body: JSON.stringify(payload)\n        });\n        const data = await response.json();\n        if (!response.ok) throw new Error(data.message || data.details || "提交失败");\n        applicationMessage.textContent = "提交成功。你的同行申请已经进入 EchoCity。";\n        setTimeout(() => {\n          modal.hidden = true;\n          document.body.classList.remove("modal-open");\n          applicationButton.textContent = "提交同行申请";\n        }, 1600);\n      } catch (error) {\n        applicationMessage.textContent = `提交失败：${error.message}`;\n        applicationMessage.classList.add("error");\n      } finally {\n        applicationButton.disabled = false;\n      }\n    });\n\n    function escapeAttribute(value) {\n      return escapeHtml(value).replaceAll("`", "&#096;");\n    }\n
    loadWishes();
    setInterval(loadWishes, 60000);
  </script>

  <div id="applicationModal" class="application-modal" hidden>
    <div class="application-backdrop" data-close-modal></div>
    <section class="application-dialog" role="dialog" aria-modal="true" aria-labelledby="applicationTitle">
      <button class="modal-close" type="button" aria-label="关闭" data-close-modal>×</button>
      <p class="eyebrow">WALK TOGETHER</p>
      <h2 id="applicationTitle">我愿意同行</h2>
      <p id="selectedWishText" class="selected-wish-text"></p>
      <form id="applicationForm">
        <input id="applicationWishId" type="hidden">
        <label for="applicantName">你的姓名或昵称</label>
        <input id="applicantName" type="text" required placeholder="例如：Peter">
        <label for="applicantContact">联系方式</label>
        <input id="applicantContact" type="text" required placeholder="邮箱、微信或其他联系方式">
        <label for="applicantMessage">你想对愿望发起人说什么？</label>
        <textarea id="applicantMessage" required placeholder="请说明你为什么愿意同行，以及你能提供什么帮助。"></textarea>
        <button id="applicationSubmitButton" class="btn btn-primary application-submit" type="submit">提交同行申请</button>
        <p id="applicationMessage" class="form-message" aria-live="polite"></p>
      </form>
    </section>
  </div>

</body>
</html>
