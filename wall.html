<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愿望广场｜EchoCity</title>
  <link rel="stylesheet" href="style.css?v=20260716-5">
</head>
<body class="inner-page wall-page">
  <header class="simple-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">E</span>
      <span>EchoCity</span>
    </a>
    <a class="btn btn-primary small" href="wish.html">发布愿望</a>
  </header>

  <main class="wall-shell">
    <section class="wall-heading">
      <p class="eyebrow">WISH WALL</p>
      <h1>愿望广场</h1>
      <p>愿望被看见，同行者才有机会出现。</p>
    </section>

    <section class="wall-toolbar">
      <div>
        <strong id="wallCount">正在读取愿望……</strong>
        <p id="wallStatus" class="wall-status">请稍候</p>
      </div>
      <a class="wall-share-link" href="wish.html">＋ 发布一个新愿望</a>
    </section>

    <section id="wishGrid" class="wish-grid" aria-live="polite"></section>
  </main>

  <div id="applicationModal" class="application-modal" hidden>
    <div class="application-backdrop" data-close-modal></div>

    <section class="application-dialog" role="dialog" aria-modal="true" aria-labelledby="applicationTitle">
      <button class="modal-close" type="button" aria-label="关闭" data-close-modal>×</button>
      <p class="eyebrow">WALK TOGETHER</p>
      <h2 id="applicationTitle">我愿意同行</h2>
      <p id="selectedWishText" class="selected-wish-text"></p>

      <form id="applicationForm">
        <input id="applicationWishId" type="hidden">

        <label for="applicantName">你的姓名或昵称</label>
        <input id="applicantName" type="text" required placeholder="例如：Peter">

        <label for="contactType">联系方式类型 / Contact method</label>

<select id="contactType" required>
  <option value="">请选择 / Select</option>
  <option value="email">Email</option>
  <option value="whatsapp">WhatsApp</option>
  <option value="telegram">Telegram</option>
  <option value="wechat">WeChat</option>
  <option value="linkedin">LinkedIn</option>
  <option value="instagram">Instagram</option>
  <option value="x">X / Twitter</option>
  <option value="discord">Discord</option>
  <option value="website">Personal Website</option>
  <option value="other">其他 / Other</option>
</select>

<label for="applicantContact">联系方式 / Contact details</label>

<input
  id="applicantContact"
  type="text"
  required
  placeholder="请先选择联系方式类型 / Select a contact method first"
>

        <label for="applicantMessage">你想对愿望发起人说什么？</label>
        <textarea id="applicantMessage" required placeholder="请说明你为什么愿意同行，以及你能提供什么帮助。"></textarea>

        <button id="applicationSubmitButton" class="btn btn-primary application-submit" type="submit">
          提交同行申请
        </button>
        <p id="applicationMessage" class="form-message" aria-live="polite"></p>
      </form>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://fhckjaidiqnozhpxkavt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_g--rklRl7JhuX2RsA5L-ow_wi5w9tYa";

    const wallCount = document.getElementById("wallCount");
    const wallStatus = document.getElementById("wallStatus");
    const wishGrid = document.getElementById("wishGrid");

    const modal = document.getElementById("applicationModal");
    const applicationForm = document.getElementById("applicationForm");
    const applicationMessage = document.getElementById("applicationMessage");
    const applicationSubmitButton = document.getElementById("applicationSubmitButton");

    async function loadWishes() {
      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/wishes?select=id,created_at,wish,importance,difficulty,companion,first_step&order=created_at.desc&limit=60`,
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        const rows = await response.json();

        if (!response.ok) {
          throw new Error(rows.message || rows.details || "读取失败");
        }

        if (!Array.isArray(rows) || rows.length === 0) {
          wallCount.textContent = "还没有愿望";
          wallStatus.textContent = "成为第一个发布愿望的人。";
          wishGrid.innerHTML = "";
          return;
        }

        wallCount.textContent = `已经有 ${rows.length} 个愿望被看见`;
        wallStatus.textContent = "愿望按照发布时间由新到旧排列。";

        wishGrid.innerHTML = rows.map((item, index) => {
          return `
            <article class="wish-card community-card">
              <div class="wish-card-top">
                <div class="wish-avatar" aria-hidden="true">${getAvatar(item.wish, index)}</div>
                <div class="wish-meta">
                  <strong>EchoCity 居民</strong>
                  <span title="${escapeAttribute(formatFullTime(item.created_at))}">
                    ${formatRelativeTime(item.created_at)}
                  </span>
                </div>
              </div>

              <div class="wish-card-body">
                <p class="wish-label">愿望</p>
                <h2>${escapeHtml(item.wish)}</h2>

                <div class="wish-detail-list">
                  <p><strong>为什么重要</strong><span>${escapeHtml(item.importance || "未填写")}</span></p>
                  <p><strong>当前困难</strong><span>${escapeHtml(item.difficulty || "未填写")}</span></p>
                  <p><strong>希望同行者</strong><span>${escapeHtml(item.companion || "未填写")}</span></p>
                  <p><strong>第一步</strong><span>${escapeHtml(item.first_step || "未填写")}</span></p>
                </div>
              </div>

              <div class="wish-card-actions">
                <button
                  class="companion-button"
                  type="button"
                  data-wish-id="${Number(item.id)}"
                  data-wish-text="${escapeAttribute(item.wish)}"
                >
                  我愿意同行
                </button>
              </div>

              <div class="wish-card-footer">
                <span>愿望编号 EC-${String(item.id).padStart(4, "0")}</span>
                <span class="wish-visible-badge">公开可见</span>
              </div>
            </article>
          `;
        }).join("");

        bindCompanionButtons();
      } catch (error) {
        wallCount.textContent = "愿望读取失败";
        wallStatus.textContent = error.message;
        wallStatus.classList.add("error");
      }
    }

    function bindCompanionButtons() {
      document.querySelectorAll(".companion-button").forEach((button) => {
        button.addEventListener("click", () => {
          openApplicationModal(button.dataset.wishId, button.dataset.wishText);
        });
      });
    }

    function openApplicationModal(wishId, wishText) {
      applicationForm.reset();
      applicationMessage.textContent = "";
      applicationMessage.classList.remove("error");

      document.getElementById("applicationWishId").value = wishId;
      document.getElementById("selectedWishText").textContent = `申请同行的愿望：${wishText}`;

      modal.hidden = false;
      document.body.classList.add("modal-open");
      setTimeout(() => document.getElementById("applicantName").focus(), 50);
    }

    function closeApplicationModal() {
      modal.hidden = true;
      document.body.classList.remove("modal-open");
      applicationMessage.textContent = "";
      applicationMessage.classList.remove("error");
    }

    document.querySelectorAll("[data-close-modal]").forEach((element) => {
      element.addEventListener("click", closeApplicationModal);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modal.hidden) {
        closeApplicationModal();
      }
    });

    const contactType = document.getElementById("contactType");
const applicantContact = document.getElementById("applicantContact");

const contactPlaceholders = {
  email: "name@example.com",
  whatsapp: "+1 555 123 4567",
  telegram: "@username",
  wechat: "WeChat ID",
  linkedin: "linkedin.com/in/username",
  instagram: "@username",
  x: "@username",
  discord: "username",
  website: "https://example.com",
  other: "请输入其他联系方式 / Enter contact details"
};

contactType.addEventListener("change", () => {
  applicantContact.value = "";

  applicantContact.placeholder =
    contactPlaceholders[contactType.value] ||
    "请先选择联系方式类型 / Select a contact method first";

  if (contactType.value === "email") {
    applicantContact.type = "email";
  } else if (contactType.value === "whatsapp") {
    applicantContact.type = "tel";
  } else {
    applicantContact.type = "text";
  }
});
    applicationForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        wish_id: Number(document.getElementById("applicationWishId").value),
        name: document.getElementById("applicantName").value.trim(),
        message: document.getElementById("applicantMessage").value.trim(),
       contact_type: document.getElementById("contactType").value,
        contact: document.getElementById("applicantContact").value.trim()
      };

      if (!payload.wish_id || !payload.name || !payload.message || !payload.contact) {
        showApplicationMessage("请完整填写姓名、联系方式和留言。", true);
        return;
      }

      applicationSubmitButton.disabled = true;
      applicationSubmitButton.textContent = "正在提交……";
      showApplicationMessage("正在把你的同行申请送往 EchoCity……", false);

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/applications`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Prefer": "return=representation"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || data.details || "同行申请提交失败");
        }

        showApplicationMessage("提交成功。你的同行申请已经进入 EchoCity。", false);
        applicationSubmitButton.textContent = "已提交";

        setTimeout(() => {
          closeApplicationModal();
          applicationForm.reset();
          applicationSubmitButton.textContent = "提交同行申请";
        }, 1700);
      } catch (error) {
        showApplicationMessage(`提交失败：${error.message}`, true);
      } finally {
        applicationSubmitButton.disabled = false;
      }
    });

    function showApplicationMessage(text, isError) {
      applicationMessage.textContent = text;
      applicationMessage.classList.toggle("error", isError);
    }

    function formatRelativeTime(dateString) {
      const then = new Date(dateString);
      const now = new Date();
      const diff = Math.max(0, now - then);
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;

      if (diff < minute) return "刚刚";
      if (diff < hour) return `${Math.floor(diff / minute)}分钟前`;

      if (then.toDateString() === now.toDateString()) {
        return `今天 ${then.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
      }

      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);

      if (then.toDateString() === yesterday.toDateString()) {
        return `昨天 ${then.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
      }

      if (diff < 7 * day) return `${Math.floor(diff / day)}天前`;

      return then.toLocaleDateString("zh-CN", {
        year: then.getFullYear() === now.getFullYear() ? undefined : "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatFullTime(dateString) {
      return new Date(dateString).toLocaleString("zh-CN");
    }

    function getAvatar(text, index) {
      const symbols = ["愿", "梦", "行", "光", "城", "心", "路", "新"];
      let sum = index;

      for (const char of String(text || "")) {
        sum += char.charCodeAt(0);
      }

      return symbols[sum % symbols.length];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    loadWishes();
  </script>
</body>
</html>
