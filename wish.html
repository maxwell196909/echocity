<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>发布我的愿望 | EchoCity</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
color:#666;
}

label{
display:block;
margin-top:30px;
font-weight:bold;
}

textarea{
width:100%;
height:90px;
padding:12px;
font-size:16px;
}

button{
margin-top:40px;
background:#222;
color:white;
padding:16px 40px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

  <h1>发布我的愿望</h1>

  <p>
    每一个伟大的故事，都始于一个真实的愿望。
  </p>

  <label>1. 你的愿望是什么？</label>
  <textarea id="wish"></textarea>

  <label>2. 为什么它对你重要？</label>
  <textarea id="importance"></textarea>

  <label>3. 你现在最大的困难是什么？</label>
  <textarea id="difficulty"></textarea>

  <label>4. 希望谁与你同行？</label>
  <textarea id="companion"></textarea>

  <label>5. 第一步准备做什么？</label>
  <textarea id="firstStep"></textarea>

  <button type="button" onclick="publishWish()">
    发布我的愿望
  </button>

  <div
    id="result"
    style="display:none;margin-top:40px;padding:30px;background:#f2f2f2;border-radius:12px;"
  >
    <h2>我的愿望卡片</h2>
    <div id="wishCard"></div>
  </div>

<script>
function publishWish() {
  const wish = document.getElementById("wish").value.trim();
  const importance = document.getElementById("importance").value.trim();
  const difficulty = document.getElementById("difficulty").value.trim();
  const companion = document.getElementById("companion").value.trim();
  const firstStep = document.getElementById("firstStep").value.trim();

  if (!wish) {
    alert("请先填写你的愿望。");
    return;
  }

  const data = {
    wish: wish,
    importance: importance,
    difficulty: difficulty,
    companion: companion,
    firstStep: firstStep,
    createdAt: new Date().toLocaleString()
  };

  localStorage.setItem("echocityWish", JSON.stringify(data));

  document.getElementById("wishCard").innerHTML = `
    <p><strong>愿望：</strong>${wish}</p>
    <p><strong>为什么重要：</strong>${importance || "未填写"}</p>
    <p><strong>当前困难：</strong>${difficulty || "未填写"}</p>
    <p><strong>希望谁同行：</strong>${companion || "未填写"}</p>
    <p><strong>第一步：</strong>${firstStep || "未填写"}</p>
    <p><small>发布时间：${data.createdAt}</small></p>
  `;

  const result = document.getElementById("result");
  result.style.display = "block";
  result.scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
