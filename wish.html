<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>发布我的愿望 | EchoCity</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;margin:0;padding:40px 20px;color:#111}
    .container{max-width:900px;margin:auto;background:#fff;padding:40px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    h1{font-size:42px;margin:0 0 10px}
    .intro{color:#666;margin-bottom:30px}
    label{display:block;margin-top:28px;margin-bottom:8px;font-weight:700;font-size:18px}
    textarea{width:100%;min-height:120px;padding:14px;font-size:17px;border:1px solid #ddd;border-radius:10px;resize:vertical}
    button{margin-top:36px;background:#222;color:#fff;padding:16px 36px;font-size:18px;border:0;border-radius:10px;cursor:pointer}
    #message{display:none;margin-top:20px;padding:12px 16px;background:#fff4d8;border-radius:8px}
    #result{display:none;margin-top:40px;padding:30px;background:#f2f2f2;border-radius:12px}
    .back{display:inline-block;margin-bottom:24px;color:#333;text-decoration:none}
    @media(max-width:640px){body{padding:20px 12px}.container{padding:24px 18px}h1{font-size:34px}}
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="index.html">← 返回 EchoCity</a>
    <h1>发布我的愿望</h1>
    <p class="intro">每一个伟大的故事，都始于一个真实的愿望。</p>

    <form id="wishForm">
      <label for="wish">1. 你的愿望是什么？</label>
      <textarea id="wish" required></textarea>

      <label for="importance">2. 为什么它对你重要？</label>
      <textarea id="importance"></textarea>

      <label for="difficulty">3. 你现在最大的困难是什么？</label>
      <textarea id="difficulty"></textarea>

      <label for="companion">4. 希望谁与你同行？</label>
      <textarea id="companion"></textarea>

 <script>
const SUPABASE_URL = "https://fhckjaidiqnozhpxkavt.supabase.co";
const SUPABASE_KEY = "sb_publishable_g--rklRl7JhuX2RsA5L-ow_wi5w9tYa";

async function publishWish() {

    const wish = document.getElementById("wish").value.trim();
    const importance = document.getElementById("importance").value.trim();
    const difficulty = document.getElementById("difficulty").value.trim();
    const companion = document.getElementById("companion").value.trim();
    const firstStep = document.getElementById("firstStep").value.trim();

    if (!wish) {
        alert("请填写愿望");
        return;
    }

    const response = await fetch(
        SUPABASE_URL + "/rest/v1/wishes",
        {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": "Bearer " + SUPABASE_KEY,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            },
            body: JSON.stringify({
                wish: wish,
                importance: importance,
                difficulty: difficulty,
                companion: companion,
                first_step: firstStep
            })
        }
    );

    if (!response.ok) {
        const err = await response.text();
        alert("发布失败：" + err);
        return;
    }

    const rows = await response.json();

    const item = rows[0];

    document.getElementById("wishCard").innerHTML = `
        <p><b>愿望：</b>${item.wish}</p>
        <p><b>重要性：</b>${item.importance}</p>
        <p><b>困难：</b>${item.difficulty}</p>
        <p><b>同行者：</b>${item.companion}</p>
        <p><b>第一步：</b>${item.first_step}</p>
        <p><b>发布时间：</b>${new Date(item.created_at).toLocaleString()}</p>
    `;

    document.getElementById("result").style.display = "block";
}
</script>     <label for="firstStep">5. 第一步准备做什么？</label>
      <textarea id="firstStep"></textarea>

      <button type="submit">发布我的愿望</button>
    </form>

    <div id="message"></div>

    <section id="result" aria-live="polite">
      <h2>我的愿望卡片</h2>
      <div id="wishCard"></div>
    </section>
  </div>

  
</body>
</html>
