<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>建立我的数字身份 | EchoCity</title>

  <link rel="stylesheet" href="style.css">

  <style>
    .identity-page {
      min-height: 100vh;
      padding: 120px 24px 60px;
      background:
        linear-gradient(rgba(12, 18, 24, 0.78), rgba(12, 18, 24, 0.88)),
        url("hero-city.jpg") center/cover fixed;
    }

    .identity-container {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 44px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      background: rgba(18, 26, 34, 0.88);
      color: white;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
    }

    .identity-back {
      display: inline-block;
      margin-bottom: 30px;
      color: #f5c451;
      text-decoration: none;
    }

    .identity-title {
      margin: 0 0 14px;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.05;
    }

    .identity-intro {
      margin-bottom: 36px;
      color: rgba(255,255,255,0.72);
      line-height: 1.8;
    }

    .identity-form {
      display: grid;
      gap: 24px;
    }

    .identity-field {
      display: grid;
      gap: 10px;
    }

    .identity-field label {
      font-weight: 700;
    }

    .identity-field input,
    .identity-field textarea,
    .identity-field select {
      width: 100%;
      box-sizing: border-box;
      padding: 15px 16px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      font: inherit;
      outline: none;
    }

    .identity-field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .identity-field input:focus,
    .identity-field textarea:focus,
    .identity-field select:focus {
      border-color: #f5c451;
    }

    .identity-submit {
      padding: 16px 22px;
      border: 0;
      border-radius: 999px;
      background: #f5c451;
      color: #171717;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .identity-note {
      display: none;
      margin-top: 24px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(245,196,81,0.14);
      color: #ffe6a3;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .identity-container {
        padding: 28px 20px;
      }
    }
  </style>
</head>

<body>

  <main class="identity-page">

    <section class="identity-container">

      <a class="identity-back" href=" ">
        ← 返回 EchoCity
      </a >

      <p>YOUR FIRST STEP IN ECHOCITY</p >

      <h1 class="identity-title">
        建立我的数字身份
      </h1>

      <p class="identity-intro">
        在 EchoCity，身份不只是一组账号和密码。
        它是你是谁、你珍视什么、你希望怎样生活的真实记录。
      </p >

      <form class="identity-form" id="identityForm">

        <div class="identity-field">
          <label for="name">你的名字</label>
          <input
            id="name"
            name="name"
            type="text"
            placeholder="请输入你的名字"
            required
          >
        </div>

        <div class="identity-field">
          <label for="identity">你如何描述自己</label>
          <textarea
            id="identity"
            name="identity"
            placeholder="例如：父亲、工程师、基督徒、学习者、城市建设者……"
            required
          ></textarea>
        </div>

        <div class="identity-field">
          <label for="purpose">你为什么来到 EchoCity</label>
          <textarea
            id="purpose"
            name="purpose"
            placeholder="写下你来到这里的原因"
            required
          ></textarea>
        </div>

        <div class="identity-field">
          <label for="wish">你的第一个愿望</label>
          <textarea
            id="wish"
            name="wish"
            placeholder="你希望在这里实现什么"
            required
          ></textarea>
        </div>

        <button class="identity-submit" type="submit">
          创建我的数字身份
        </button>

      </form>

      <div class="identity-note" id="identityNote">
        你的数字身份已经在这台设备上创建。下一步，我们将把它连接到 EchoCity 的居民系统。
      </div>

    </section>

  </main>

  <script>
    const identityForm = document.getElementById("identityForm");
    const identityNote = document.getElementById("identityNote");

    identityForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const identityData = {
        name: document.getElementById("name").value.trim(),
        identity: document.getElementById("identity").value.trim(),
        purpose: document.getElementById("purpose").value.trim(),
        wish: document.getElementById("wish").value.trim(),
        createdAt: new Date().toISOString()
      };

      localStorage.setItem(
        "echoCityDigitalIdentity",
        JSON.stringify(identityData)
      );

      identityNote.style.display = "block";
      identityNote.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    });
  </script>

</body>
</html>
